<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>찍찍이 잡기 🐭</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- ===== 상단 상태 표시줄 ===== -->
    <header id="status-bar">
      <div class="stat" id="stat-score">
        <span class="stat-label">점수</span>
        <span class="stat-value" id="score-value">0</span>
        <span class="stat-sub">잡을수록 +1</span>
      </div>
      <div class="stat" id="stat-time">
        <span class="stat-label">남은 시간</span>
        <span class="stat-value" id="time-value">30</span>
        <span class="stat-sub">30초 제한</span>
      </div>
    </header>

    <!-- 상태 배너 (색 + 문구) -->
    <div id="state-banner" class="banner-ready">🐭 준비하세요!</div>

    <!-- 남은 시간 바 -->
    <div class="bar-wrap">
      <div class="bar-track"><div id="time-fill" class="time-fill"></div></div>
    </div>

    <!-- 항상 보이는 안내: 고양이 감점 -->
    <p id="hint"><span class="hint-good">🐭 찍찍이 +1점</span> · <span class="hint-bad">🐱 고양이를 잡으면 −1점!</span></p>

    <!-- ===== 두더지 밭 (3x3) ===== -->
    <main id="board">
      <!-- 9칸: script.js에서 두더지를 넣고 뺍니다 -->
      <button class="hole" data-idx="0"><span class="mole">🐭</span></button>
      <button class="hole" data-idx="1"><span class="mole">🐭</span></button>
      <button class="hole" data-idx="2"><span class="mole">🐭</span></button>
      <button class="hole" data-idx="3"><span class="mole">🐭</span></button>
      <button class="hole" data-idx="4"><span class="mole">🐭</span></button>
      <button class="hole" data-idx="5"><span class="mole">🐭</span></button>
      <button class="hole" data-idx="6"><span class="mole">🐭</span></button>
      <button class="hole" data-idx="7"><span class="mole">🐭</span></button>
      <button class="hole" data-idx="8"><span class="mole">🐭</span></button>
    </main>

    <!-- ===== 시작 화면 ===== -->
    <section id="start-screen" class="overlay">
      <h1>🐭 찍찍이 잡기</h1>
      <p class="desc">
        9개의 구멍에서 찍찍이가 <b>불쑥불쑥</b> 튀어나와요.<br />
        사라지기 전에 <b>클릭(터치)해서 잡으면 +1점!</b><br />
        시간이 갈수록 찍찍이가 <b>점점 빨라집니다.</b>
      </p>
      <ul class="rules">
        <li>⏱ 제한시간 30초</li>
        <li>🐭 찍찍이를 잡으면 +1점 (놓쳐도 감점 없음)</li>
        <li>🐱 고양이를 잡으면 −1점 감점! (헷갈리지 마세요)</li>
        <li>🔥 후반부일수록 빨라져서 어려워요</li>
      </ul>
      <button id="start-btn" class="big-btn">게임 시작 🐭</button>
    </section>

    <!-- ===== 결과 화면 ===== -->
    <section id="result-screen" class="overlay hidden">
      <div id="result-emoji">🏆</div>
      <h1 id="result-title">결과</h1>
      <p id="result-score">점수: 0</p>
      <p id="result-desc"></p>
      <button id="restart-btn" class="big-btn">다시 하기 🔄</button>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
